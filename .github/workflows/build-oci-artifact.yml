name: Build and Push OCI Artifact

on:
  push:
    branches:
      - snapshot

env:
  REGISTRY: quay.io
  IMAGE_NAME: debezium/debezium-descriptors

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate commit info

      - name: Extract metadata from manifest
        id: metadata
        run: |
          # Find the manifest.json (should be in version directory)
          MANIFEST_PATH=$(find . -name "manifest.json" -type f | head -n 1)

          if [ -z "$MANIFEST_PATH" ]; then
            echo "Error: manifest.json not found"
            exit 1
          fi

          echo "Found manifest at: $MANIFEST_PATH"

          # Extract version from first component (they should all have same version)
          VERSION=$(jq -r '.components | to_entries | .[0].value[0].version // "unknown"' "$MANIFEST_PATH")

          # Extract build metadata if present
          SOURCE_REPO=$(jq -r '.build.sourceRepository // "unknown"' "$MANIFEST_PATH")
          SOURCE_COMMIT=$(jq -r '.build.sourceCommit // "unknown"' "$MANIFEST_PATH")
          BUILD_TIMESTAMP=$(jq -r '.build.timestamp // "unknown"' "$MANIFEST_PATH")

          # Get current git commit
          GIT_COMMIT=$(git rev-parse --short HEAD)

          # Generate timestamp for this OCI build
          OCI_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Output all metadata
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "source_repo=$SOURCE_REPO" >> $GITHUB_OUTPUT
          echo "source_commit=$SOURCE_COMMIT" >> $GITHUB_OUTPUT
          echo "build_timestamp=$BUILD_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "oci_timestamp=$OCI_TIMESTAMP" >> $GITHUB_OUTPUT

          echo "Extracted metadata:"
          echo "  Version: $VERSION"
          echo "  Source Repository: $SOURCE_REPO"
          echo "  Source Commit: $SOURCE_COMMIT"
          echo "  Original Build Timestamp: $BUILD_TIMESTAMP"
          echo "  Git Commit: $GIT_COMMIT"
          echo "  OCI Build Timestamp: $OCI_TIMESTAMP"

      - name: Install ORAS
        run: |
          VERSION="1.1.0"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_${VERSION}_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_${VERSION}_*.tar.gz oras-install/
          oras version

      - name: Log in to Quay.io
        run: |
          echo "${{ secrets.QUAY_IO_PASSWORD }}" | oras login ${{ env.REGISTRY }} \
            --username ${{ secrets.QUAY_IO_USERNAME }} \
            --password-stdin

      - name: Create artifact bundle
        run: |
          # Create a temporary directory for the artifact
          mkdir -p /tmp/oci-artifact

          # Copy entire repository content
          cp -r . /tmp/oci-artifact/

          # Remove .git directory to reduce size
          rm -rf /tmp/oci-artifact/.git
          rm -rf /tmp/oci-artifact/.github

          echo "Artifact contents:"
          ls -lah /tmp/oci-artifact/

      - name: Push OCI artifact
        run: |
          # Generate tag
          NIGHTLY_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly"

          # Change to artifact directory to use relative path
          cd /tmp/oci-artifact

          # Push with all metadata annotations
          oras push "$NIGHTLY_TAG" \
            --artifact-type application/vnd.debezium.descriptors.v1+json \
            --annotation "org.opencontainers.image.created=${{ steps.metadata.outputs.oci_timestamp }}" \
            --annotation "org.opencontainers.image.version=${{ steps.metadata.outputs.version }}" \
            --annotation "org.opencontainers.image.revision=${{ steps.metadata.outputs.git_commit }}" \
            --annotation "org.opencontainers.image.source=https://github.com/debezium/debezium-descriptors-registry" \
            --annotation "org.opencontainers.image.url=https://github.com/debezium/debezium-descriptors-registry" \
            --annotation "org.opencontainers.image.documentation=https://github.com/debezium/debezium-descriptors-registry/blob/snapshot/README.md" \
            --annotation "org.opencontainers.image.title=Debezium Descriptors Registry" \
            --annotation "org.opencontainers.image.description=Official registry of JSON configuration schemas for Debezium connectors, transformations, and sink connectors" \
            --annotation "io.debezium.source.repository=${{ steps.metadata.outputs.source_repo }}" \
            --annotation "io.debezium.source.commit=${{ steps.metadata.outputs.source_commit }}" \
            --annotation "io.debezium.build.timestamp=${{ steps.metadata.outputs.build_timestamp }}" \
            .

          echo "Successfully pushed OCI artifact with tag: $NIGHTLY_TAG"

      - name: Verify artifact
        run: |
          oras manifest fetch "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly"
