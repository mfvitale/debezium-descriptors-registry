name: Build and Push OCI Artifact (Snapshot)

on:
  repository_dispatch:
    types:
      - snapshot-updated

env:
  REGISTRY: quay.io
  IMAGE_NAME: debezium/debezium-descriptors

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: snapshot
          fetch-depth: 0

      - name: Checkout GitHub Actions from main
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            .github/actions
          sparse-checkout-cone-mode: false
          path: _github_main
          fetch-depth: 1

      - name: Copy actions to workspace
        run: cp -r _github_main/.github/actions .github/actions

      - name: Find manifest
        id: find-manifest
        run: |
          MANIFEST_PATH=$(find . -maxdepth 2 -name "manifest.json" -type f | head -n 1)

          if [ -z "$MANIFEST_PATH" ]; then
            echo "Error: manifest.json not found"
            exit 1
          fi

          echo "manifest_path=$MANIFEST_PATH" >> $GITHUB_OUTPUT
          echo "Found manifest at: $MANIFEST_PATH"

      - name: Extract metadata
        id: metadata
        uses: ./.github/actions/extract-manifest-metadata
        with:
          manifest-path: ${{ steps.find-manifest.outputs.manifest_path }}

      - name: Setup ORAS
        uses: ./.github/actions/setup-oras

      - name: Login to registry
        uses: ./.github/actions/login-registry
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      - name: Create artifact bundle
        run: |
          mkdir -p /tmp/oci-artifact
          cp -r . /tmp/oci-artifact/
          rm -rf /tmp/oci-artifact/.git
          rm -rf /tmp/oci-artifact/.github

          echo "Artifact contents:"
          ls -lah /tmp/oci-artifact/

      - name: Push OCI artifact
        uses: ./.github/actions/push-oci-artifact
        with:
          artifact-path: /tmp/oci-artifact
          registry: ${{ env.REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          tag: nightly
          version: ${{ steps.metadata.outputs.version }}
          source-repo: ${{ steps.metadata.outputs.source-repo }}
          source-commit: ${{ steps.metadata.outputs.source-commit }}
          build-timestamp: ${{ steps.metadata.outputs.build-timestamp }}
          git-commit: ${{ steps.metadata.outputs.git-commit }}
          oci-timestamp: ${{ steps.metadata.outputs.oci-timestamp }}
          documentation-branch: snapshot

      - name: Verify artifact
        run: |
          oras manifest fetch "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly"
